name: Build llama.cpp with CUDA
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no new release'
        required: false
        type: boolean
        default: false
jobs:
  check-release:
    runs-on: ubuntu-slim
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      release_hash: ${{ steps.check.outputs.release_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check for new llama.cpp release
        id: check
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r '.tag_name')
          RELEASE_HASH=$(curl -s https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r '.target_commitish')

          echo "Latest llama.cpp release: $LATEST_RELEASE"
          echo "Release hash: $RELEASE_HASH"

          if git tag | grep -q "^${LATEST_RELEASE}$"; then
            echo "Release $LATEST_RELEASE already built"
            if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
              echo "Force build enabled, building anyway"
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "New release detected: $LATEST_RELEASE"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

          echo "release_tag=$LATEST_RELEASE" >> "$GITHUB_OUTPUT"
          echo "release_hash=$RELEASE_HASH" >> "$GITHUB_OUTPUT"
  build:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        cuda:
          - version: "12.9.2"
            short: "12.9"
            architectures: "60;61;62;70;72"
            tag: "12.9.2-cudnn-devel-ubuntu24.04"
          - version: "13.3.0"
            short: "13.3"
            architectures: "75;80;86;89;90;100;103;110;120;121"
            tag: "13.3.0-cudnn-devel-ubuntu24.04"
        arch:
          - name: "amd64"
            runner: "ubuntu-24.04"
          - name: "arm64"
            runner: "ubuntu-24.04-arm"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Maximize build space
        run: |
          echo "=== Initial Disk Space ==="
          df -h

          echo "=== Removing unnecessary packages ==="
          sudo apt-get remove -y '^aspnetcore-.*' || true
          sudo apt-get remove -y '^dotnet-.*' --fix-missing || true
          sudo apt-get remove -y '^llvm-.*' --fix-missing || true
          sudo apt-get remove -y 'php.*' --fix-missing || true
          sudo apt-get remove -y '^mongodb-.*' --fix-missing || true
          sudo apt-get remove -y '^mysql-.*' --fix-missing || true
          sudo apt-get remove -y azure-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri --fix-missing || true
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true

          echo "=== Removing large directories ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          docker system prune -af || true

          echo "=== After Cleanup ==="
          df -h
      - name: Build llama.cpp with CUDA
        run: |
          docker pull nvidia/cuda:${{ matrix.cuda.tag }}

          docker run --rm \
            -v "$PWD":/workspace \
            nvidia/cuda:${{ matrix.cuda.tag }} \
            bash -c "
              set -e

              echo '=== Installing minimal dependencies ==='
              apt-get update -qq
              apt-get install -y --no-install-recommends git cmake ninja-build build-essential libssl-dev ca-certificates gcc-14 g++-14
              apt-get clean
              rm -rf /var/lib/apt/lists/*

              echo '=== Cloning llama.cpp ==='
              cd /workspace
              git clone --depth 1 --branch ${{ needs.check-release.outputs.release_tag }} https://github.com/ggml-org/llama.cpp.git || \
                (git clone https://github.com/ggml-org/llama.cpp.git && cd llama.cpp && git checkout ${{ needs.check-release.outputs.release_hash }})
              cd llama.cpp

              # shellcheck disable=SC2016
              echo '=== Configuring build with Ninja ==='
              export LIBRARY_PATH=\"/usr/local/cuda/lib64/stubs\${LIBRARY_PATH:+:\$LIBRARY_PATH}\"
              ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1

              export CC=/usr/bin/gcc-14 CXX=/usr/bin/g++-14

              cmake -B build -S . \
                -G Ninja \
                -DGGML_CUDA=ON \
                -DCMAKE_CUDA_ARCHITECTURES='${{ matrix.cuda.architectures }}' \
                -DCMAKE_BUILD_TYPE=Release \
                -DGGML_NATIVE=OFF \
                -DGGML_BACKEND_DL=ON \
                -DGGML_CPU_ALL_VARIANTS=ON \
                -DLLAMA_BUILD_TESTS=OFF \
                -DLLAMA_BUILD_EXAMPLES=OFF \
                -DCMAKE_EXE_LINKER_FLAGS='-Wl,-rpath,\$ORIGIN:\$ORIGIN/../cuda-runtime-${{ matrix.cuda.short }} -Wl,-rpath-link,/usr/local/cuda/lib64/stubs' \
                -DCMAKE_SHARED_LINKER_FLAGS='-Wl,-rpath,\$ORIGIN:\$ORIGIN/../cuda-runtime-${{ matrix.cuda.short }} -Wl,-rpath-link,/usr/local/cuda/lib64/stubs' \
                -DCMAKE_CUDA_FLAGS=-Wno-deprecated-gpu-targets

              echo '=== Building with Ninja (parallel: all cores) ==='
              cmake --build build --config Release -j\$(nproc)

              echo '=== Copying binaries ==='
              cd /workspace
              mkdir -p binaries/cuda-${{ matrix.cuda.short }}

              cp -r llama.cpp/build/bin/* binaries/cuda-${{ matrix.cuda.short }}/

              if [ -d llama.cpp/build/lib ]; then
                find llama.cpp/build/lib -name '*.so*' -exec cp {} binaries/cuda-${{ matrix.cuda.short }}/ \; 2>/dev/null || true
              fi

              find binaries/cuda-${{ matrix.cuda.short }}/ -type f -executable ! -name '*.so*' -exec strip {} \; 2>/dev/null || true

              echo '=== Bundling CUDA runtime libraries ==='
              cd /workspace/llama.cpp/build/bin
              for f in *; do
                if [ -f \"\$f\" ]; then
                  ldd \"\$f\" 2>/dev/null | grep /usr/local/cuda | awk '{print \$3}' >> /tmp/cuda_libs.txt
                fi
              done
              mkdir -p /workspace/binaries/cuda-runtime-${{ matrix.cuda.short }}
              sort -u /tmp/cuda_libs.txt | while read -r lib; do
                if [ -n \"\$lib\" ] && [ -f \"\$lib\" ]; then
                  cp -v \"\$lib\" /workspace/binaries/cuda-runtime-${{ matrix.cuda.short }}/
                fi
              done

              cd /workspace
              echo '=== Creating version info ==='
              echo 'llama.cpp version: ${{ needs.check-release.outputs.release_tag }}' > binaries/cuda-${{ matrix.cuda.short }}/VERSION.txt
              echo 'CUDA version: ${{ matrix.cuda.version }}' >> binaries/cuda-${{ matrix.cuda.short }}/VERSION.txt
              echo 'Architectures: ${{ matrix.cuda.architectures }}' >> binaries/cuda-${{ matrix.cuda.short }}/VERSION.txt
              echo 'Build date: '\$(date -u +%Y-%m-%d) >> binaries/cuda-${{ matrix.cuda.short }}/VERSION.txt
              echo 'Build hash: ${{ needs.check-release.outputs.release_hash }}' >> binaries/cuda-${{ matrix.cuda.short }}/VERSION.txt

              echo '=== Build complete ==='
              ls -lh binaries/cuda-${{ matrix.cuda.short }}/

              echo '=== Cleaning up build directory ==='
              rm -rf llama.cpp
            "

          docker rmi nvidia/cuda:${{ matrix.cuda.tag }} || true

          sudo chown -R "$(id -u):$(id -g)" "$PWD"

          echo "=== Final disk usage ==="
          df -h
      - name: Create tarball
        run: |
          cd binaries
          tar -czf llama.cpp-${{ needs.check-release.outputs.release_tag }}-cuda-${{ matrix.cuda.short }}-${{ matrix.arch.name }}.tar.gz cuda-${{ matrix.cuda.short }}
          tar -czf cuda-runtime-${{ matrix.cuda.short }}-${{ matrix.arch.name }}.tar.gz cuda-runtime-${{ matrix.cuda.short }}
          ls -lh ./*.tar.gz
      - name: Smoke test
        run: |
          cd binaries || exit 1
          tarball="llama.cpp-${{ needs.check-release.outputs.release_tag }}-cuda-${{ matrix.cuda.short }}-${{ matrix.arch.name }}.tar.gz"
          if [ ! -f "$tarball" ]; then echo "Missing: $tarball"; exit 1; fi
          echo "Tarball: $(stat -c%s "$tarball") bytes"
          dir="smoke"
          mkdir -p "$dir" && tar -xzf "$tarball" -C "$dir"
          bindir="$dir/cuda-${{ matrix.cuda.short }}"
          for bin in llama-cli llama-server llama-bench; do
            if [ -f "$bindir/$bin" ] && [ -s "$bindir/$bin" ]; then
              echo "Pass: $bin ($(stat -c%s "$bindir/$bin") bytes)"
            fi
          done
          if [ -f "$bindir/VERSION.txt" ]; then cat "$bindir/VERSION.txt"; else echo "Missing VERSION.txt"; exit 1; fi
          if ldd "$bindir/llama-cli" 2>/dev/null | grep -E "(cuda|cublas|cudart)" | head -3; then echo "Pass: CUDA linkage"; fi
          if timeout 10 "$bindir/llama-cli" --help >/dev/null 2>&1; then echo "Pass: llama-cli --help"; fi
          rm -rf "$dir"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: llama.cpp-cuda-${{ matrix.cuda.short }}-${{ matrix.arch.name }}
          path: binaries/*.tar.gz
          retention-days: 1
  release:
    needs: [check-release, build]
    if: success()
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum ./*.tar.gz > SHA256SUMS
          ls -lh SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check-release.outputs.release_tag }}
          name: llama.cpp ${{ needs.check-release.outputs.release_tag }} with CUDA
          body: |
            # llama.cpp ${{ needs.check-release.outputs.release_tag }} with CUDA Support

            Pre-built binaries of llama.cpp with CUDA support.

            **Source:** https://github.com/ggml-org/llama.cpp/releases/tag/${{ needs.check-release.outputs.release_tag }}
            **Commit:** ${{ needs.check-release.outputs.release_hash }}

            ## Downloads

            **CUDA 12.9** (Pascal, Volta — driver 525-575)
            - [Linux x64 (amd64)](https://github.com/${{ github.repository }}/releases/download/${{ needs.check-release.outputs.release_tag }}/llama.cpp-${{ needs.check-release.outputs.release_tag }}-cuda-12.9-amd64.tar.gz) — [CUDA Runtime 12.9 amd64](https://github.com/${{ github.repository }}/releases/download/${{ needs.check-release.outputs.release_tag }}/cuda-runtime-12.9-amd64.tar.gz)
            - [Linux arm64 (aarch64)](https://github.com/${{ github.repository }}/releases/download/${{ needs.check-release.outputs.release_tag }}/llama.cpp-${{ needs.check-release.outputs.release_tag }}-cuda-12.9-arm64.tar.gz) — [CUDA Runtime 12.9 arm64](https://github.com/${{ github.repository }}/releases/download/${{ needs.check-release.outputs.release_tag }}/cuda-runtime-12.9-arm64.tar.gz)

            **CUDA 13.3** (Turing and newer — driver 580+)
            - [Linux x64 (amd64)](https://github.com/${{ github.repository }}/releases/download/${{ needs.check-release.outputs.release_tag }}/llama.cpp-${{ needs.check-release.outputs.release_tag }}-cuda-13.3-amd64.tar.gz) — [CUDA Runtime 13.3 amd64](https://github.com/${{ github.repository }}/releases/download/${{ needs.check-release.outputs.release_tag }}/cuda-runtime-13.3-amd64.tar.gz)
            - [Linux arm64 (aarch64)](https://github.com/${{ github.repository }}/releases/download/${{ needs.check-release.outputs.release_tag }}/llama.cpp-${{ needs.check-release.outputs.release_tag }}-cuda-13.3-arm64.tar.gz) — [CUDA Runtime 13.3 arm64](https://github.com/${{ github.repository }}/releases/download/${{ needs.check-release.outputs.release_tag }}/cuda-runtime-13.3-arm64.tar.gz)

            > **Note:** CUDA Runtime tarball is needed **only if your system does not have that CUDA version installed**. One-time download, reusable across builds.

            ## Supported GPUs

            | CUDA | Architectures | GPU families | Min. Driver |
            |------|--------------|--------------|-------------|
            | 12.9 | sm_60–sm_72 | Pascal (P100, GTX 10xx), Volta (V100) | 525-575 |
            | 13.3 | sm_75–sm_121 | Turing (RTX 20xx), Ampere (RTX 30xx, A100) and newer | 580+ |

            Full docs: [README](https://github.com/${{ github.repository }})
          files: release-assets/*
          draft: false
          prerelease: false
      - name: Delete old releases
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_COUNT: 5
        run: |
          REPO=${{ github.repository }}
          releases=$(gh release list --repo "$REPO" --limit 100 \
            --json name,createdAt \
            --jq 'sort_by(.createdAt) | reverse')
          echo "$releases" | jq -r ".[$KEEP_COUNT:] | .[].name" | \
            while read -r release; do
              if [ -n "$release" ]; then
                echo "Deleting old release: $release"
                gh release delete "$release" --repo "$REPO" --yes
              fi
            done
