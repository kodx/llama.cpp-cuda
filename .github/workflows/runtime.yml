name: Release CUDA Runtime
run-name: Release CUDA Runtime ${{ inputs.cuda_version }}

on:
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA version to package'
        required: true
        type: choice
        options:
          - 13.3.0
          - 12.9.2
          - custom
      custom_cuda_version:
        description: 'Custom CUDA version (used if "custom" selected above)'
        required: false
        type: string

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Determine versions
        run: |
          if [ "$CUDA_VERSION_IN" = "custom" ]; then
            CUDA_VERSION="$CUSTOM_VERSION"
          else
            CUDA_VERSION="$CUDA_VERSION_IN"
          fi
          {
            echo "CUDA_VERSION=$CUDA_VERSION"
            echo "CUDA_SHORT=${CUDA_VERSION%.*}"
            echo "CUDA_MAJOR=${CUDA_VERSION%%.*}"
          } >> "$GITHUB_ENV"
        env:
          CUDA_VERSION_IN: ${{ inputs.cuda_version }}
          CUSTOM_VERSION: ${{ inputs.custom_cuda_version }}

      - name: Download and pack CUDA runtime
        run: |
          MANIFEST="redistrib_${CUDA_VERSION}.json"
          wget "https://developer.download.nvidia.com/compute/cuda/redist/$MANIFEST"

          for arch_pair in "amd64:linux-x86_64" "arm64:linux-aarch64"; do
            ARCH_NAME="${arch_pair%%:*}"
            LINUX_ARCH="${arch_pair##*:}"

            mkdir "runtime-${ARCH_NAME}"

            for pkg in cuda_cudart libcublas; do
              REL=$(jq -r --arg pkg "$pkg" --arg arch "${LINUX_ARCH}" '.[$pkg][$arch].relative_path // empty' "$MANIFEST")
              if [ -z "$REL" ]; then
                REL=$(jq -r --arg pkg "$pkg" --arg arch "linux-sbsa" '.[$pkg][$arch].relative_path // empty' "$MANIFEST")
              fi
              wget "https://developer.download.nvidia.com/compute/cuda/redist/$REL"

              tmpdir=$(mktemp -d)
              tar -xJf "$(basename "$REL")" -C "$tmpdir"
              find "$tmpdir" -name '*.so*' ! -path '*/stubs/*' ! -name 'libnvblas*' -exec cp -a {} "runtime-${ARCH_NAME}/" \;
              rm -rf "$tmpdir"
            done

            # Download NCCL matching CUDA version
            NCCL_VERSION="2.30.7"
            case "$ARCH_NAME" in
              amd64) NCCL_ARCH="x86_64" ;;
              arm64) NCCL_ARCH="aarch64" ;;
            esac
            NCCL_URL="https://developer.download.nvidia.com/compute/redist/nccl/v${NCCL_VERSION}/nccl_${NCCL_VERSION}-1+cuda${CUDA_SHORT}_${NCCL_ARCH}.txz"
            wget "$NCCL_URL"
            tmpdir=$(mktemp -d)
            tar -xJf "$(basename "$NCCL_URL")" -C "$tmpdir"
            find "$tmpdir" -name '*.so*' -exec cp -a {} "runtime-${ARCH_NAME}/" \;
            rm -rf "$tmpdir"

            cd "runtime-${ARCH_NAME}"
            mkdir -p "../llama-cpp-cuda${CUDA_MAJOR}-runtime"
            cp -a ./*.so* "../llama-cpp-cuda${CUDA_MAJOR}-runtime/"
            cd "../llama-cpp-cuda${CUDA_MAJOR}-runtime"
            for f in *.so.*; do
              base="${f%.so.*}.so"
              [ ! -e "$base" ] && ln -s "$f" "$base"
            done
            chmod 755 ./*.so*
            echo "CUDA_VERSION=${CUDA_VERSION}" > VERSION.txt
            cd ..
            tar -czf "llama-cpp-cuda${CUDA_MAJOR}-runtime-${ARCH_NAME}.tar.gz" "llama-cpp-cuda${CUDA_MAJOR}-runtime"
            rm -rf "llama-cpp-cuda${CUDA_MAJOR}-runtime" "runtime-${ARCH_NAME}"
          done


      - name: Generate checksums
        run: |
          sha256sum llama-cpp-cuda*-runtime-*.tar.gz > SHA256SUMS
          ls -lh SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: llama-cpp-cuda${{ env.CUDA_MAJOR }}-runtime
          name: CUDA Runtime ${{ env.CUDA_VERSION }}
          body: |
            Standalone CUDA runtime libraries for version ${{ env.CUDA_VERSION }}.

            Includes: `libcudart.so`, `libcublas.so`, `libcublasLt.so`, `libnccl.so.2`

            **Downloads:**
            - [llama-cpp-cuda${{ env.CUDA_MAJOR }}-runtime-amd64.tar.gz](${{ github.server_url }}/${{ github.repository }}/releases/download/llama-cpp-cuda${{ env.CUDA_MAJOR }}-runtime/llama-cpp-cuda${{ env.CUDA_MAJOR }}-runtime-amd64.tar.gz) — x86_64
            - [llama-cpp-cuda${{ env.CUDA_MAJOR }}-runtime-arm64.tar.gz](${{ github.server_url }}/${{ github.repository }}/releases/download/llama-cpp-cuda${{ env.CUDA_MAJOR }}-runtime/llama-cpp-cuda${{ env.CUDA_MAJOR }}-runtime-arm64.tar.gz) — aarch64

            Extract the llama.cpp and CUDA runtime tarballs alongside each other:

            ```bash
            tar -xzf llama-cpp-bXXXX-cuda${{ env.CUDA_MAJOR }}-amd64.tar.gz
            tar -xzf llama-cpp-cuda${{ env.CUDA_MAJOR }}-runtime-amd64.tar.gz
            ```

            The binaries will discover the runtime libraries automatically via RUNPATH.
          files: |
            llama-cpp-cuda*-runtime-*.tar.gz
            SHA256SUMS
          draft: false
          prerelease: true
