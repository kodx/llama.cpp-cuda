name: Release CUDA Runtime
run-name: Release CUDA Runtime ${{ inputs.cuda_version }}

on:
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA version to package'
        required: true
        type: choice
        options:
          - 13.3.0
          - 12.9.2
          - custom
      custom_cuda_version:
        description: 'Custom CUDA version (used if "custom" selected above)'
        required: false
        type: string

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Determine versions
        run: |
          if [ "$CUDA_VERSION_IN" = "custom" ]; then
            CUDA_VERSION="$CUSTOM_VERSION"
          else
            CUDA_VERSION="$CUDA_VERSION_IN"
          fi
          echo "CUDA_VERSION=$CUDA_VERSION" >> "$GITHUB_ENV"
          echo "CUDA_SHORT=${CUDA_VERSION%.*}" >> "$GITHUB_ENV"
        env:
          CUDA_VERSION_IN: ${{ inputs.cuda_version }}
          CUSTOM_VERSION: ${{ inputs.custom_cuda_version }}

      - name: Download and pack CUDA runtime
        run: |
          MANIFEST="redistrib_${CUDA_VERSION}.json"
          wget "https://developer.download.nvidia.com/compute/cuda/redist/$MANIFEST"

          for arch_pair in "amd64:linux-x86_64" "arm64:linux-aarch64"; do
            ARCH_NAME="${arch_pair%%:*}"
            LINUX_ARCH="${arch_pair##*:}"

            mkdir "runtime-${ARCH_NAME}"

            for pkg in cuda_cudart libcublas; do
              REL=$(jq -r --arg pkg "$pkg" --arg arch "${LINUX_ARCH}" '.[$pkg][$arch].relative_path // empty' "$MANIFEST")
              if [ -z "$REL" ]; then
                REL=$(jq -r --arg pkg "$pkg" --arg arch "linux-sbsa" '.[$pkg][$arch].relative_path // empty' "$MANIFEST")
              fi
              wget "https://developer.download.nvidia.com/compute/cuda/redist/$REL"

              tmpdir=$(mktemp -d)
              tar -xJf "$(basename "$REL")" -C "$tmpdir"
              find "$tmpdir" -name '*.so*' ! -path '*/stubs/*' -exec cp -a {} "runtime-${ARCH_NAME}/" \;
              rm -rf "$tmpdir"
            done

            # Download NCCL matching CUDA version
            NCCL_VERSION="2.30.7"
            case "$ARCH_NAME" in
              amd64) NCCL_ARCH="x86_64" ;;
              arm64) NCCL_ARCH="aarch64" ;;
            esac
            NCCL_URL="https://developer.download.nvidia.com/compute/redist/nccl/v${NCCL_VERSION}/nccl_${NCCL_VERSION}-1+cuda${CUDA_SHORT}_${NCCL_ARCH}.txz"
            wget "$NCCL_URL"
            tmpdir=$(mktemp -d)
            tar -xJf "$(basename "$NCCL_URL")" -C "$tmpdir"
            find "$tmpdir" -name '*.so*' -exec cp -a {} "runtime-${ARCH_NAME}/" \;
            rm -rf "$tmpdir"

            cd "runtime-${ARCH_NAME}"
            mkdir -p "../cuda-runtime-${CUDA_SHORT}"
            cp -a ./*.so* "../cuda-runtime-${CUDA_SHORT}/"
            cd "../cuda-runtime-${CUDA_SHORT}"
            for f in *.so.*; do
              base="${f%.so.*}.so"
              [ ! -e "$base" ] && ln -s "$f" "$base"
            done
            chmod 755 ./*.so*
            echo "CUDA_VERSION=${CUDA_VERSION}" > VERSION.txt
            cd ..
            tar -czf "cuda-runtime-${CUDA_SHORT}-${ARCH_NAME}.tar.gz" "cuda-runtime-${CUDA_SHORT}"
            rm -rf "cuda-runtime-${CUDA_SHORT}" "runtime-${ARCH_NAME}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: cuda-runtime-${{ env.CUDA_SHORT }}
          name: CUDA Runtime ${{ env.CUDA_VERSION }}
          body: |
            Standalone CUDA runtime libraries for version ${{ env.CUDA_VERSION }}.

            Includes: \`libcudart.so\`, \`libcublas.so\`, \`libcublasLt.so\`, \`libnccl.so.2\`

            **Downloads:**
            - [cuda-runtime-${{ env.CUDA_SHORT }}-amd64.tar.gz](${{ github.server_url }}/${{ github.repository }}/releases/download/cuda-runtime-${{ env.CUDA_SHORT }}/cuda-runtime-${{ env.CUDA_SHORT }}-amd64.tar.gz) — x86_64
            - [cuda-runtime-${{ env.CUDA_SHORT }}-arm64.tar.gz](${{ github.server_url }}/${{ github.repository }}/releases/download/cuda-runtime-${{ env.CUDA_SHORT }}/cuda-runtime-${{ env.CUDA_SHORT }}-arm64.tar.gz) — aarch64

            Extract into the same directory as llama.cpp binaries (RPATH is set to \`\$ORIGIN\`).
          files: cuda-runtime-*.tar.gz
          draft: false
          prerelease: false
